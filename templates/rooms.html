<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>房间管理</title>
    <link rel="stylesheet" href="/static/rooms.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="page">
      <header class="topbar">
        <div>
          <h1>房间管理</h1>
          <p>按日期查看房态，点房间方块查看详情并管理楼层/房间。</p>
        </div>
        <div class="action-group">
          <a href="/dashboard" class="btn btn-ghost">返回库存台</a>
          <button id="refreshBtn" class="btn btn-primary">刷新房态</button>
        </div>
      </header>

      <section class="panel controls-grid">
        <div class="controls-row">
          <label>
            查看日期
            <input id="statusDate" type="date" />
          </label>

          <form id="addFloorForm" class="inline-form">
            <label>
              新增楼层
              <input name="name" type="text" placeholder="例如：4层" required />
            </label>
            <button type="submit" class="btn btn-ghost">添加楼层</button>
          </form>
        </div>

        <form id="addRoomForm" class="inline-form">
          <label>
            楼层
            <select name="floorId" required></select>
          </label>
          <label>
            房号
            <input name="number" type="text" placeholder="例如：201" required />
          </label>
          <label>
            房型
            <select name="roomType" required></select>
          </label>
          <button type="submit" class="btn btn-ghost">添加房间</button>
        </form>

        <div class="inline-form backup-tools">
          <button id="exportBackupBtn" type="button" class="btn btn-ghost">导出近30天备份</button>
          <label>
            导入备份文件
            <input id="backupFile" type="file" accept="application/json" />
          </label>
          <button id="importBackupBtn" type="button" class="btn btn-ghost">导入备份</button>
          <span class="hint backup-export-date">上次导出：<strong id="lastBackupExportDate">未记录</strong></span>
        </div>
      </section>

      <section class="panel summary-grid">
        <div class="summary-item">
          <span class="summary-label">总房间</span>
          <strong id="totalRooms">0</strong>
        </div>
        <div class="summary-item">
          <span class="summary-label">在住房间</span>
          <strong id="occupiedRooms">0</strong>
        </div>
        <div class="summary-item">
          <span class="summary-label">待入住房间</span>
          <strong id="upcomingRooms">0</strong>
        </div>
        <div class="summary-item">
          <span class="summary-label">空闲房间</span>
          <strong id="idleRooms">0</strong>
        </div>
        <div class="summary-item">
          <span class="summary-label">维修房间</span>
          <strong id="maintenanceRooms">0</strong>
        </div>
        <button id="unfinishedOrdersCard" type="button" class="summary-item summary-action">
          <span class="summary-label">未完成订单总数</span>
          <strong id="unfinishedOrdersCount">0</strong>
        </button>
      </section>

      <section class="room-layout">
        <div class="panel">
          <div class="panel-title-row">
            <h2>楼层与房间平面</h2>
            <span class="hint">仅 2 层默认营业；点击方块看详情</span>
          </div>
          <div id="floorBoard" class="floor-board">
            <div class="board-empty">正在加载房间数据...</div>
          </div>
        </div>

        <aside class="panel detail-panel" id="roomDetailPanel">
          <div class="panel-title-row">
            <h2>房间详情</h2>
            <span class="hint">点击方块后可改房型；空闲/维修房可在状态切换</span>
          </div>

          <div id="roomDetailEmpty" class="detail-empty">请选择左侧房间方块</div>

          <div id="roomDetailContent" class="detail-content hidden">
            <div class="detail-row"><span>房号</span><strong id="detailNumber">-</strong></div>
            <div class="detail-row"><span>楼层</span><strong id="detailFloor">-</strong></div>
            <div class="detail-row">
              <span>状态</span>
              <strong id="detailStatusText">-</strong>
              <select id="detailStatusSelect" class="hidden">
                <option value="空闲">空闲</option>
                <option value="维修">维修</option>
              </select>
            </div>
            <div class="detail-row"><span>预约</span><strong id="detailReservation">-</strong></div>

            <label>
              房型
              <select id="detailRoomType"></select>
            </label>

            <div class="detail-actions">
              <button type="button" id="saveRoomTypeBtn" class="btn btn-primary">保存信息</button>
              <button type="button" id="deleteRoomBtn" class="btn btn-ghost">删除房间</button>
            </div>
          </div>
        </aside>
      </section>
      <section class="panel tips-panel">
        <div class="panel-title-row">
          <h2>说明</h2>
        </div>
        <p class="hint">可在楼层头部切换“开放/未开放”。未开放楼层不会参与可选房号和每日可售房量。</p>
      </section>
    </main>

    <div id="unfinishedOrdersModal" class="modal hidden" aria-hidden="true">
      <div class="modal-card">
        <div class="modal-head">
          <h3>未完成订单</h3>
          <button id="closeUnfinishedOrdersBtn" class="icon-btn" aria-label="关闭">×</button>
        </div>

        <div class="unfinished-filters">
          <label>
            平台
            <select id="unfinishedPlatformFilter">
              <option value="">全部平台</option>
            </select>
          </label>
          <label>
            房型
            <select id="unfinishedRoomTypeFilter">
              <option value="">全部房型</option>
            </select>
          </label>
        </div>

        <div id="unfinishedOrdersContent" class="unfinished-orders-list">
          <div class="board-empty">暂无未完成订单</div>
        </div>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="/static/rooms.js"></script>
  </body>
</html>
